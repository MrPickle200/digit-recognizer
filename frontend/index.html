<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digit Recognizer MVP</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Vẽ một chữ số (0-9)</h2>
        <canvas id="paintCanvas" width="280" height="280"></canvas>
        
        <div class="controls">
            <button id="btnClear">Xóa trắng</button>
            <button id="btnPredict">Dự đoán</button>
        </div>
        
        <h3 id="result">Kết quả: <span id="digit">-</span></h3>
    </div>

    <script src="app.js"></script>
</body>
</html>
