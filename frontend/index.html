<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digit Recognizer MVP</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧠</text></svg>">
</head>
<body>
    <div class="container">
        <h2>Vẽ một chữ số (0-9)</h2>
        <canvas id="paintCanvas" width="280" height="280"></canvas>
        
        <div class="controls">
            <button id="btnClear">Xóa trắng</button>
            <button id="btnPredict">Dự đoán</button>
        </div>
        
        <h3 id="result">Kết quả: <span id="digit">-</span></h3>
    </div>

    <div id="feedbackArea" style="display: none;">
    <p>Kết quả sai? Chọn số đúng:</p>
    <select id="correctLabel">
        <option value="0">0</option>
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
        <option value="6">6</option>
        <option value="7">7</option>
        <option value="8">8</option>
        <option value="9">9</option>
    </select>
        
    <button id="btnSendFeedback">Gửi phản hồi</button>
    </div>

    <script src="app.js"></script>    
</body>
</html>
